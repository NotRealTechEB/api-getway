spring.application.name=pilotoGW

spring.cloud.gateway.routes[0].id=planes-service
spring.cloud.gateway.routes[0].uri=https://planvuelo.onrender.com
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/planvuelo/**

spring.cloud.gateway.routes[1].id=registro-vuelo
spring.cloud.gateway.routes[1].uri=https://registrovuelo.onrender.com
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/registrovuelo/**

spring.cloud.gateway.routes[2].id=empresa-proveedora
spring.cloud.gateway.routes[2].uri=https://empresaproveedora1.onrender.com
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/empresas-proveedoras/**

spring.cloud.gateway.routes[3].id=drones
spring.cloud.gateway.routes[3].uri=https://drones1-1.onrender.com/
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/drones/**

spring.cloud.gateway.routes[4].id=tipo-trabajo
spring.cloud.gateway.routes[4].uri=https://tipotrabajo.onrender.com
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/tipos-trabajo/**


spring.cloud.gateway.httpclient.connect-timeout=10000
spring.cloud.gateway.httpclient.response-timeout=60s
spring.cloud.gateway.default-filters=

